name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # กดรันเองจากหน้า Actions ได้ด้วย

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and deploy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: d4059d56fe5e2bd760150499f6ab1f3f
          command: pages deploy dist --project-name=acp-booklet
